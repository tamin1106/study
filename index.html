<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamin의 스마트 암기 도구 (Chemistry Edition)</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 25px; }
        input[type="text"] { flex: 1; padding: 12px; border: 2px solid #eef0f2; border-radius: 10px; font-size: 15px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        .add-btn { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        
        .subject-list { list-style: none; padding: 0; }
        .subject-item { background: #fdfdfd; border: 1px solid #eee; margin-bottom: 15px; padding: 15px; border-radius: 12px; }
        .subject-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .subject-name { font-weight: 800; font-size: 18px; color: #222; }
        .delete-btn { background: #ffeded; color: #ff5c5c; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight:bold; }
        
        .action-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .file-label, .paste-btn { flex: 1; background: #f0f7ff; color: #4a90e2; padding: 8px; text-align: center; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px dashed #4a90e2; font-weight:bold; }
        .paste-btn { background: #fff4e6; color: #fd7e14; border-color: #fd7e14; }
        .study-btn { flex: 1; background: #4a90e2; color: white; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight:bold; display: none; }
        input[type="file"] { display: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; padding: 20px; box-sizing: border-box;}
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; z-index: 1010; transition: transform 0.2s;}

        .paste-modal-content { background: white; width: 90%; max-width: 500px; padding: 20px; border-radius: 16px; color: #333; display: flex; flex-direction: column; gap: 15px; }
        .paste-modal-content textarea { width: 100%; height: 250px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 14px; resize: none; box-sizing: border-box; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .notebook { background: #eef1f5; width: 95%; max-width: 900px; height: 85vh; overflow-y: auto; border-radius: 20px; padding: 30px; box-sizing: border-box; }
        .note-item-block { background: white; border-radius: 16px; padding: 30px; margin-bottom: 25px; border-left: 8px solid #4a90e2; }
        .note-title { font-size: 26px; font-weight: 900; color: #111; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; line-height: 1.4; }
        .note-content { font-size: 19px; font-weight: 500; color: #333; line-height: 1.8; }
        .text-red { color: #e84118; font-weight: 900; }
        .text-blue { color: #0097e6; font-weight: 900; }
        .text-hl { background-color: #fbc531; color: #111; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
        .note-image { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 15px 0; display: block; }
        .lewis-img { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; max-width: 80%; margin: 10px 0; }
        
        .card-container { perspective: 1000px; width: 100%; max-width: 600px; min-height: 400px; margin-bottom: 20px; display: flex; align-items: stretch; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; display: flex; align-items: stretch;}
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; font-size: 22px; font-weight: bold; padding: 40px; box-sizing: border-box; background: white; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.2); flex-direction: column; line-height: 1.5; overflow-y: auto;}
        .card-back { transform: rotateY(180deg); background: #f8fbff; border: 4px solid var(--primary); }
        
        .quiz-type-badge { font-size: 13px; color: white; background: #888; padding: 4px 10px; border-radius: 20px; position: absolute; top: 20px; left: 20px; font-weight: bold; }
        .quiz-type-mcq { background: #4caf50; }
        .quiz-type-desc { background: #9c27b0; }
        
        .mcq-options { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; width: 100%; }
        .mcq-btn { width: 100%; padding: 15px; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; cursor: pointer; text-align: left; transition: all 0.2s; font-weight: 600; color: #333; }
        .mcq-btn:hover { background: #e3f2fd; border-color: #4a90e2; }
        
        .nav-btns { display: flex; gap: 20px; }
        .nav-btns button { padding: 15px 35px; border-radius: 12px; border: none; cursor: pointer; background: var(--primary); color: white; font-weight: 900; font-size: 18px;}

        .ai-tutor-btn { position: fixed; bottom: 30px; right: 30px; background: #2b3137; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 28px; cursor: pointer; z-index: 100; border: none; }
        .chat-window { display: none; position: fixed; bottom: 110px; right: 30px; width: 380px; height: 550px; background: white; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); z-index: 100; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        .chat-header { background: #2b3137; color: white; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; gap: 12px; font-size: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; word-break: break-all; }
        .msg.user { align-self: flex-end; background: #4a90e2; color: white; border-bottom-right-radius: 2px; }
        .msg.bot { align-self: flex-start; background: #f1f3f5; color: #222; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 스마트 학습 관리자</h2>
    <div id="loadingState" style="text-align: center; color: #888; font-size: 14px; margin-bottom: 10px; display: none;">🔄 동기화 중...</div>
    <div class="input-group">
        <input type="text" id="subjectInput" placeholder="과목 입력 (예: 화학I)" onkeypress="if(event.key==='Enter')addSubject()">
        <button class="add-btn" onclick="addSubject()">과목 추가</button>
    </div>
    <ul class="subject-list" id="subjectList"></ul>
</div>

<div id="studyArea" class="modal">
    <span class="close-btn" onclick="closeStudy()">&times;</span>
    <div id="modeTitle" style="margin-bottom: 15px; font-size: 20px; color: #ddd; font-weight:900;"></div>
    <div id="noteDisplay" class="notebook" style="display: none;"></div>
    
    <div id="flashcardDisplay" class="card-container" style="display: none;">
        <div class="card-inner" id="cardInner" onclick="flipCard()">
            <div class="card-face card-front">
                <div id="quizBadge" class="quiz-type-badge">Q. 문제</div>
                <div id="cardFrontContent" style="width: 100%;"></div>
            </div>
            <div class="card-face card-back">
                <div class="quiz-type-badge" style="background:#4a90e2;">A. 정답/해설</div>
                <div id="cardBackContent" style="width: 100%;"></div>
            </div>
        </div>
    </div>
    
    <div class="nav-btns" id="cardNav" style="display: none;">
        <button onclick="prevItem()">◀ 이전</button>
        <button onclick="nextItem()">다음 ▶</button>
    </div>
    <div id="progress" style="margin-top: 20px; font-size: 16px; font-weight:bold;"></div>
</div>

<div id="pasteModal" class="modal">
    <span class="close-btn" onclick="closePasteModal()">&times;</span>
    <div class="paste-modal-content">
        <h3 id="pasteModalTitle" style="margin:0;">📝 내용 붙여넣기</h3>
        <p style="font-size: 13px; color: #666; margin:0;">AI가 준 JSON 코드를 아래에 그대로 붙여넣어 주세요.</p>
        <textarea id="pasteTextarea" placeholder="여기에 붙여넣으세요..."></textarea>
        <button class="save-btn" onclick="savePastedData()">저장하기</button>
    </div>
</div>

<button class="ai-tutor-btn" onclick="toggleChat()">🤖</button>
<div class="chat-window" id="chatWindow">
    <div class="chat-header"><span>🤖 AI 질문 튜터</span><span class="chat-close" onclick="toggleChat()">&times;</span></div>
    <div style="padding:10px; background:#f8f9fa; border-bottom:1px solid #eee;"><input type="password" id="geminiApiKey" style="width:100%; padding:8px; box-sizing:border-box;" placeholder="Gemini API Key 입력"></div>
    <div class="chat-body" id="chatBody"><div class="msg bot">질문을 입력하세요!</div></div>
    <div style="display:flex; padding:15px; background:white; border-top:1px solid #eee; gap:10px;">
        <input type="text" id="chatMessage" style="flex:1; padding:10px; border:1px solid #ddd; border-radius:8px;" placeholder="질문..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="padding:10px 15px; background:#4a90e2; color:white; border:none; border-radius:8px;">전송</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCTUv3jOEX_SNROCR5s0r3_q9QoZ1aW91w",
        authDomain: "study-97499.firebaseapp.com",
        databaseURL: "https://study-97499-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "study-97499",
        storageBucket: "study-97499.firebasestorage.app",
        messagingSenderId: "381744064476",
        appId: "1:381744064476:web:3b6250871638feb0a01119",
        measurementId: "G-NB1DLK7RBG"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('tamin_study_data/subjects');
    const WOLFRAM_APP_ID = "VPY5J4-VWJP"; // 제공하신 API 적용

    let subjects = {}; 
    let currentData = [];
    let currentIndex = 0;
    let targetSubject = "";
    let targetType = "";

    document.getElementById('loadingState').style.display = 'block';
    dbRef.once('value').then((snapshot) => {
        document.getElementById('loadingState').style.display = 'none';
        if (snapshot.exists()) { subjects = snapshot.val(); }
        renderList();
    });

    function saveToFirebase() { dbRef.set(subjects); }

    function addSubject() {
        const input = document.getElementById('subjectInput');
        const name = input.value.trim();
        if (!name) return;
        if (!subjects[name]) { subjects[name] = { memo: null, quiz: null }; renderList(); saveToFirebase(); }
        input.value = "";
    }

    function deleteSubject(name) { if(confirm(`${name}을 삭제할까요?`)) { delete subjects[name]; renderList(); saveToFirebase(); } }

    function renderList() {
        const list = document.getElementById('subjectList');
        list.innerHTML = "";
        for (let name in subjects) {
            const li = document.createElement('li');
            li.className = 'subject-item';
            li.innerHTML = `
                <div class="subject-header"><span class="subject-name">${name}</span><button class="delete-btn" onclick="deleteSubject('${name}')">삭제</button></div>
                <div class="action-group">
                    <label class="file-label">📂 암기노트 파일 <input type="file" onchange="loadFile(event, '${name}', 'memo')"></label>
                    <div class="paste-btn" onclick="openPasteModal('${name}', 'memo')">📋 복붙하기</div>
                </div>
                <div class="action-group">
                    <label class="file-label">📝 퀴즈 파일 <input type="file" onchange="loadFile(event, '${name}', 'quiz')"></label>
                    <div class="paste-btn" onclick="openPasteModal('${name}', 'quiz')">📋 복붙하기</div>
                </div>
                <div class="action-group">
                    <button id="btn-memo-${name}" class="study-btn" style="background:#00b894; ${subjects[name].memo ? 'display:block' : ''}" onclick="startStudy('${name}', 'memo')">📖 노트</button>
                    <button id="btn-quiz-${name}" class="study-btn" style="background:#e17055; ${subjects[name].quiz ? 'display:block' : ''}" onclick="startStudy('${name}', 'quiz')">🔄 퀴즈</button>
                </div>
            `;
            list.appendChild(li);
        }
    }

    function loadFile(event, name, type) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) { handleDataSave(name, type, e.target.result); };
        reader.readAsText(file);
    }

    function openPasteModal(name, type) {
        targetSubject = name;
        targetType = type;
        document.getElementById('pasteModalTitle').textContent = `[${name}] ${type === 'memo' ? '암기노트' : '퀴즈'} 붙여넣기`;
        document.getElementById('pasteTextarea').value = "";
        document.getElementById('pasteModal').style.display = 'flex';
    }

    function closePasteModal() { document.getElementById('pasteModal').style.display = 'none'; }

    function savePastedData() {
        const text = document.getElementById('pasteTextarea').value.trim();
        if (!text) return;
        handleDataSave(targetSubject, targetType, text);
        closePasteModal();
    }

    function handleDataSave(name, type, rawData) {
        try {
            const parsed = JSON.parse(rawData);
            subjects[name][type] = parsed;
            alert("저장되었습니다!");
            renderList();
            saveToFirebase();
        } catch (e) { alert("올바른 JSON 형식이 아닙니다. 코드를 전체 복사했는지 확인해 주세요."); }
    }

    // 텍스트 파싱 핵심 함수 (루이스 태그 추가됨)
    function parseText(text) {
        if(!text) return "";
        return text.replace(/\{이미지:(.*?)\}/g, '<img src="$1" class="note-image">')
                   // {루이스:분자식} -> WolframAlpha API로 변환 (비공유전자쌍 포함)
                   .replace(/\{루이스:(.*?)\}/g, `<img src="https://api.wolframalpha.com/v1/simple?appid=${WOLFRAM_APP_ID}&i=lewis+structure+of+$1" class="lewis-img" alt="$1 Lewis Structure">`)
                   .replace(/\{빨강:(.*?)\}/g, '<span class="text-red">$1</span>')
                   .replace(/\{파랑:(.*?)\}/g, '<span class="text-blue">$1</span>')
                   .replace(/\{형광:(.*?)\}/g, '<span class="text-hl">$1</span>')
                   .replace(/\n/g, '<br>');
    }

    function startStudy(name, type) {
        currentData = subjects[name][type];
        currentIndex = 0;
        document.getElementById('studyArea').style.display = 'flex';
        document.getElementById('modeTitle').textContent = `[${name}] ${type==='memo'?'노트':'퀴즈'}`;
        
        if (type === 'memo') {
            document.getElementById('flashcardDisplay').style.display = 'none';
            document.getElementById('cardNav').style.display = 'none';
            const noteArea = document.getElementById('noteDisplay');
            noteArea.style.display = 'block';
            noteArea.innerHTML = currentData.map(item => `<div class="note-item-block"><div class="note-title">${parseText(item.title)}</div><div class="note-content">${parseText(item.content)}</div></div>`).join('');
            document.getElementById('progress').style.display = 'none';
        } else {
            document.getElementById('noteDisplay').style.display = 'none';
            document.getElementById('flashcardDisplay').style.display = 'flex';
            document.getElementById('cardNav').style.display = 'flex';
            document.getElementById('progress').style.display = 'block';
            showCardItem();
        }
    }

    function showCardItem() {
        const item = currentData[currentIndex];
        document.getElementById('cardInner').classList.remove('is-flipped');
        
        let frontHTML = `<div>${parseText(item.question)}</div>`;
        let badge = document.getElementById('quizBadge');
        
        if (item.type === 'multiple_choice' && item.options) {
            badge.textContent = '🔢 객관식';
            badge.className = 'quiz-type-badge quiz-type-mcq';
            frontHTML += `<div class="mcq-options">`;
            item.options.forEach((opt, idx) => {
                frontHTML += `<button class="mcq-btn">${idx + 1}. ${parseText(opt)}</button>`;
            });
            frontHTML += `</div>`;
        } else if (item.type === 'descriptive') {
            badge.textContent = '✍️ 서술형';
            badge.className = 'quiz-type-badge quiz-type-desc';
        } else {
            badge.textContent = '⚡ 단답형';
            badge.className = 'quiz-type-badge';
        }

        document.getElementById('cardFrontContent').innerHTML = frontHTML;
        document.getElementById('cardBackContent').innerHTML = parseText(item.answer);
        document.getElementById('progress').textContent = `[ ${currentIndex + 1} / ${currentData.length} ]`;
    }

    function flipCard() { document.getElementById('cardInner').classList.toggle('is-flipped'); }
    function nextItem() { if (currentIndex < currentData.length - 1) { currentIndex++; showCardItem(); } }
    function prevItem() { if (currentIndex > 0) { currentIndex--; showCardItem(); } }
    function closeStudy() { document.getElementById('studyArea').style.display = 'none'; }

    function toggleChat() { const c = document.getElementById('chatWindow'); c.style.display = c.style.display==='flex'?'none':'flex'; }
    
    async function sendMessage() {
        const key = document.getElementById('geminiApiKey').value.trim();
        const msg = document.getElementById('chatMessage').value.trim();
        if(!key || !msg) return;
        
        const body = document.getElementById('chatBody');
        body.innerHTML += `<div class="msg user">${msg}</div>`;
        document.getElementById('chatMessage').value = "";
        
        const loadingId = "loading-" + Date.now();
        body.innerHTML += `<div class="msg bot" id="${loadingId}">답변 생성 중... 🤔</div>`;
        body.scrollTop = body.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({contents: [{parts: [{text: msg}]}]})
            });
            const data = await res.json();
            document.getElementById(loadingId).remove();

            if (res.ok) {
                body.innerHTML += `<div class="msg bot">${data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>')}</div>`;
            } else {
                body.innerHTML += `<div class="msg bot">⚠️ 에러: ${data.error.message}</div>`;
            }
            body.scrollTop = body.scrollHeight;
        } catch(e) { 
            document.getElementById(loadingId).remove();
            body.innerHTML += `<div class="msg bot">⚠️ 통신 오류 발생</div>`; 
        }
    }
</script>

</body>
</html>
